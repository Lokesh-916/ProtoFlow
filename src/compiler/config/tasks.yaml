# ProtoFlow Task Definitions
# Tasks run sequentially unless async_execution: true.
# Parallel tasks (db, api, ui, auth) are fanned out via asyncio.gather in crew.py.
# All LLM responses MUST be valid JSON — no prose, no markdown fences.

task_extract_intent:
  description: >
    Parse the user's natural language prompt into a structured IntentSchema.

    Extract the following fields:
    - app_type: the category of application (e.g. "CRM", "e-commerce", "project management")
    - features: list of feature names
    - entities: list of domain entity names
    - user_roles: list of user role names
    - integrations: list of third-party integrations
    - premium_requirements: description of premium/paid features if any
    - analytics_requirements: description of analytics needs if any

    Assign a confidence score (0.0 to 1.0) to the parsed result.

    HITL IS MANDATORY — ask the user at least one clarifying question on EVERY run:
    - For confidence < 0.75 or vague prompts (< 15 meaningful words): ask up to 3 targeted questions.
    - For clear prompts: ask exactly 1 confirmatory question (e.g. "I'm assuming JWT auth and
      a REST API — does that work for you?").

    Emit a hitl_required SSE event with the questions and wait for answers before producing
    the final IntentSchema output.

    Document every assumption made in the assumptions[] array.
    Record all clarification answers in clarifications_received[].

    Respond only with valid JSON. No prose, no markdown fences, no explanation.
  expected_output: >
    Valid IntentSchema JSON with fields:
    app_type (string),
    features (array of strings),
    entities (array of strings),
    user_roles (array of strings),
    integrations (array of strings),
    premium_requirements (string or null),
    analytics_requirements (string or null),
    confidence (float 0.0-1.0),
    assumptions (array of strings),
    clarifications_received (array of strings).
  agent: intent_extractor
  async_execution: false

task_design_architecture:
  description: >
    Take the IntentSchema from task_extract_intent and design the full application architecture.

    Define:
    - entities[]: all domain entities with their attributes and relationships
    - relations[]: entity relationships with cardinality (one-to-many, many-to-many, etc.)
    - page_flows[]: page navigation flows with entry points and transitions
    - role_hierarchy{}: role inheritance and permission levels
    - business_rules[]: premium gating, admin-only views, plan restrictions
    - data_flows[]: how data moves between layers

    Consider all assumptions documented by intent_extractor before designing.

    If any architectural decision has more than two equally valid approaches
    (e.g. multi-tenant vs single-tenant), ask one follow-up clarification question
    via a hitl_required SSE event before proceeding.

    Respond only with valid JSON. No prose, no markdown fences, no explanation.
  expected_output: >
    Valid ArchitectureSchema JSON with fields:
    entities (array of EntitySchema objects with name, attributes, description),
    relations (array of RelationSchema objects with from_entity, to_entity, cardinality, description),
    page_flows (array of objects with name, pages, transitions),
    role_hierarchy (object mapping role names to their parent roles and levels),
    business_rules (array of BusinessRuleSchema objects with name, description, affected_entities),
    data_flows (array of objects with name, source, destination, description).
  agent: system_architect
  context:
    - task_extract_intent
  async_execution: true

task_generate_db_schema:
  description: >
    Generate a complete relational database schema from the ArchitectureSchema.

    Rules:
    - Every entity in ArchitectureSchema MUST become a table.
    - Every table MUST have: id (UUID, primary key), created_at (timestamp), updated_at (timestamp).
    - Add soft_deleted_at (timestamp, nullable) to tables that represent user-owned resources.
    - Define all columns with: name, data_type, nullable (bool), default_value, constraints.
    - Define all foreign keys with: column, references_table, references_column, on_delete action.
    - Define indexes for all foreign key columns and frequently queried columns.
    - Define junction tables for all many-to-many relations.
    - If any relation cardinality is ambiguous, ask one follow-up clarification via hitl_required.

    Respond only with valid JSON. No prose, no markdown fences, no explanation.
  expected_output: >
    Valid DBSchema JSON with fields:
    tables (array of TableSchema objects each containing:
      name (string),
      columns (array of ColumnSchema with name, data_type, nullable, default_value, constraints),
      primary_key (string column name),
      foreign_keys (array with column, references_table, references_column, on_delete),
      indexes (array with name, columns, unique),
      relations (array describing logical relations to other tables)
    ).
  agent: db_schema_agent
  context:
    - task_design_architecture
  async_execution: true

task_generate_api_schema:
  description: >
    Generate a complete REST API schema from the ArchitectureSchema and DBSchema.

    Rules:
    - Every endpoint's request_body and response_body fields MUST map exactly to existing
      DB columns — no invented fields allowed.
    - Include for each endpoint: method, path, description, request_body{}, response_body{},
      auth_required (bool), required_role (string or null), validation_rules[], error_responses[].
    - Group endpoints by resource/entity.
    - Include standard CRUD endpoints (GET list, GET by id, POST, PUT, DELETE) for each entity.
    - Include pagination parameters (page, page_size) on all list endpoints.
    - If any endpoint's required role is ambiguous, ask one follow-up clarification via hitl_required.

    Respond only with valid JSON. No prose, no markdown fences, no explanation.
  expected_output: >
    Valid APISchema JSON with fields:
    endpoints (array of EndpointSchema objects each containing:
      method (string: GET/POST/PUT/PATCH/DELETE),
      path (string),
      description (string),
      request_body (object with field definitions or null),
      response_body (object with field definitions),
      auth_required (bool),
      required_role (string or null),
      validation_rules (array of strings),
      error_responses (array of objects with status_code and description)
    ).
  agent: api_schema_agent
  context:
    - task_design_architecture
    - task_generate_db_schema
  async_execution: true

task_generate_ui_schema:
  description: >
    Generate a complete UI schema from the ArchitectureSchema and APISchema.

    Rules:
    - Every page MUST be defined with its components, layout, and navigation links.
    - Every form field MUST map to a specific API endpoint input field.
    - Every role-gated view MUST reference a role defined in ArchitectureSchema.
    - Define navigation structure and routing (path, page title, role_required).
    - Define components per page with their type, props, and data source (API endpoint).
    - If any page's role-gating requirements are unclear, ask one follow-up via hitl_required.

    Respond only with valid JSON. No prose, no markdown fences, no explanation.
  expected_output: >
    Valid UISchema JSON with fields:
    pages (array of PageSchema objects each containing:
      path (string),
      title (string),
      role_required (string or null),
      components (array of ComponentSchema with name, type, props, api_endpoint),
      forms (array of FormSchema with name, fields, submit_endpoint),
      navigation_links (array of objects with label, path, role_required)
    ).
  agent: ui_schema_agent
  context:
    - task_design_architecture
    - task_generate_api_schema
  async_execution: true

task_generate_auth_schema:
  description: >
    Generate the complete auth and roles schema from the ArchitectureSchema.

    Rules:
    - Default to JWT unless the user specified otherwise during clarification.
    - Define: auth_strategy (string), roles[] (list of role names),
      permissions_matrix{role: {resource: [actions]}},
      premium_plan_gates{plan_name: {features: [], restrictions: []}},
      token_config{expiry_seconds, refresh_expiry_seconds, algorithm}.
    - Every role referenced anywhere in UISchema or APISchema MUST exist in roles[].
    - Every resource in permissions_matrix MUST correspond to a DB table.
    - If premium plan boundaries are not clearly defined, ask one follow-up via hitl_required.

    Respond only with valid JSON. No prose, no markdown fences, no explanation.
  expected_output: >
    Valid AuthSchema JSON with fields:
    auth_strategy (string: "jwt" or "session" or "oauth2"),
    roles (array of strings),
    permissions_matrix (object: role -> resource -> array of action strings),
    premium_plan_gates (object: plan_name -> object with features array and restrictions array),
    token_config (object with expiry_seconds, refresh_expiry_seconds, algorithm).
  agent: auth_agent
  context:
    - task_design_architecture
    - task_generate_ui_schema
  async_execution: true

task_validate_schemas:
  description: >
    Run full cross-layer consistency validation across all four schemas.

    Check ALL of the following without exception:
    1. Every API request/response field exists as a DB column.
    2. Every UI form field maps to an API endpoint input field.
    3. Every role in UI/API exists in AuthSchema roles[].
    4. Every protected API endpoint has a matching permission in AuthSchema.
    5. Every entity in Architecture has a DB table.
    6. Every DB table has at least one API endpoint.
    7. Every API endpoint has at least one UI trigger (button, form, or link).
    8. Premium gating in Auth matches business_rules in Architecture.
    9. No circular dependencies in entity relations.
    10. No orphaned entities, endpoints, or UI components.
    11. All required fields (id, created_at, updated_at) exist on every table.
    12. All foreign key references point to existing tables and columns.

    Produce a ValidationReport with:
    - is_valid (bool)
    - errors[] each with layer, field, description
    - warnings[] each with layer, field, description
    - conflicts[] each with description and resolution_strategy
    - validated_at (ISO timestamp)

    If is_valid is False, the repair loop will be triggered automatically.

    Respond only with valid JSON. No prose, no markdown fences, no explanation.
  expected_output: >
    Valid ValidationReport JSON with fields:
    is_valid (bool),
    errors (array of ErrorEntry with layer, field, description),
    warnings (array of WarningEntry with layer, field, description),
    conflicts (array of ConflictEntry with description, resolution_strategy),
    validated_at (ISO 8601 timestamp string).
  agent: validator_agent
  context:
    - task_generate_db_schema
    - task_generate_api_schema
    - task_generate_ui_schema
    - task_generate_auth_schema
  async_execution: false

task_repair_schemas:
  description: >
    Triggered only when ValidationReport.is_valid is False.

    For each error in ValidationReport.errors[]:
    1. Identify which layer is the source of truth for the conflicting data.
    2. Repair ONLY the broken layer — never modify the source-of-truth layer.
    3. Produce a before/after diff for every change made.

    Repair loop rules:
    - Maximum 3 repair attempts total.
    - Each attempt must fix at least one new error (no infinite loops).
    - If the same error persists after 2 attempts, escalate to HITL with a specific
      question asking the user to resolve the conflict manually.
    - Never do a full pipeline retry — only surgical targeted fixes.

    Return updated schemas for all modified layers along with the repair report.

    Respond only with valid JSON. No prose, no markdown fences, no explanation.
  expected_output: >
    Valid RepairReport JSON with fields:
    repairs (array of DiffEntry with error_description, layer_fixed, field_fixed, before, after),
    updated_schemas (object containing only the modified schema layers with their full updated content),
    repair_attempt_number (integer 1-3),
    unresolved_errors (array of error descriptions that could not be fixed automatically).
  agent: repair_agent
  context:
    - task_validate_schemas
  async_execution: false

task_validate_runtime:
  description: >
    Simulate execution of the complete validated schema set.

    Steps:
    1. Walk every API endpoint and verify the DB tables/columns it references exist.
    2. Walk every UI page and verify every component has a mapped API call.
    3. Verify every auth-protected route has a matching permission in AuthSchema.
    4. Simulate a complete CRUD flow for the primary entity end-to-end across all layers:
       - CREATE: UI form -> API POST -> DB INSERT
       - READ: UI list page -> API GET list -> DB SELECT
       - UPDATE: UI edit form -> API PUT -> DB UPDATE
       - DELETE: UI delete button -> API DELETE -> DB soft-delete
    5. Trace each step and record pass/fail.

    Output execution_viable (bool). If False, this is a blocking issue.

    Respond only with valid JSON. No prose, no markdown fences, no explanation.
  expected_output: >
    Valid RuntimeReport JSON with fields:
    execution_viable (bool),
    simulated_flows (array of SimulatedFlow with name, steps array, result: "pass" or "fail"),
    blocking_issues (array of strings describing unresolvable issues),
    warnings (array of strings describing non-blocking concerns).
  agent: runtime_validator
  context:
    - task_validate_schemas
    - task_repair_schemas
  async_execution: false

task_log_progress:
  description: >
    This task runs after all other tasks complete.

    Append to the run log file after each stage:
    - Stage name, agent used, model, timestamp
    - Latency in ms
    - Input summary (< 50 words)
    - Output summary (< 50 words)
    - Confidence score if available
    - Assumptions made in this stage
    - Conflicts detected and resolved
    - Whether repair was triggered
    - Tokens used if available

    At pipeline completion, generate and append:
    1. Mermaid flowchart of full pipeline execution showing which stages triggered
       repair and which triggered HITL (field: mermaid_pipeline).
    2. Mermaid ER diagram from DBSchema (field: mermaid_er).
    3. Mermaid sequence diagram for primary entity API flow (field: mermaid_sequence).

    All three Mermaid strings MUST be syntactically valid Mermaid.
    Stream every log entry to the frontend via SSE event type: log_update.

    Respond only with valid JSON. No prose, no markdown fences, no explanation.
  expected_output: >
    Valid JSON with fields:
    log_entries (array of log entry objects),
    mermaid_pipeline (string: valid Mermaid flowchart),
    mermaid_er (string: valid Mermaid erDiagram),
    mermaid_sequence (string: valid Mermaid sequenceDiagram).
  agent: progress_logger
  context:
    - task_validate_runtime
  async_execution: true
